<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<script>document.documentElement.style.zoom=Math.min(window.innerWidth/1080,window.innerHeight/1920);document.documentElement.style.background="#0a0a0a";</script>
<title>Day 3 Story — #5 vs #6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pepper-black: #0a0a0a;
    --pepper-charcoal: #1a1a1a;
    --pepper-dark: #141414;
    --heat-jalapeno: #f97316;
    --heat-poblano: #facc15;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --border-subtle: #27272a;
  }
  body {
    width: 1080px;
    height: 1920px;
    background: var(--pepper-black);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 64px;
  }
  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 30px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    margin-bottom: 56px;
  }
  .vs-container {
    width: 100%;
    max-width: 920px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .team-card {
    width: 100%;
    padding: 52px 56px;
    border-radius: 28px;
    background: var(--pepper-charcoal);
    border: 1px solid var(--border-subtle);
    position: relative;
    overflow: hidden;
  }
  .team-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 8px;
    background: var(--heat-jalapeno);
    box-shadow: 0 0 20px var(--heat-jalapeno);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .tag-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .rank-tag {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--heat-jalapeno);
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid rgba(249,115,22,0.3);
    background: rgba(249,115,22,0.06);
  }
  .trend-badge {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    padding: 6px 16px;
    border-radius: 100px;
    letter-spacing: 0.08em;
  }
  .trend-badge.up {
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.3);
    background: rgba(74,222,128,0.06);
  }
  .trend-badge.new {
    color: var(--heat-poblano);
    border: 1px solid rgba(250,204,21,0.3);
    background: rgba(250,204,21,0.06);
  }
  .scoville-mini { display: flex; gap: 8px; }
  .s-pip {
    width: 40px;
    height: 12px;
    border-radius: 6px;
    background: var(--border-subtle);
  }
  .s-pip.active { background: var(--heat-jalapeno); }
  .team-name {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 64px;
    text-transform: uppercase;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }
  .team-name.solo {
    font-size: 80px;
  }
  .team-stat {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 30px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .vs-badge {
    align-self: center;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 96px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .quiz-prompt {
    margin-top: 56px;
    padding: 24px 56px;
    border-radius: 100px;
    border: 2px solid var(--border-subtle);
    background: var(--pepper-dark);
    font-family: 'Space Mono', monospace;
    font-size: 34px;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .quiz-hint {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    color: var(--text-muted);
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="story">
  <div class="header-label">This or That</div>
  <div class="vs-container">
    <div class="team-card">
      <div class="card-header">
        <div class="tag-group">
          <div class="rank-tag">#5</div>
          <div class="trend-badge up">↑ Rising</div>
        </div>
        <div class="scoville-mini">
          <div class="s-pip active"></div><div class="s-pip active"></div><div class="s-pip active"></div><div class="s-pip"></div><div class="s-pip"></div>
        </div>
      </div>
      <div class="team-name">Haynes / Mensching / Veldman</div>
      <div class="team-stat">9th → 2nd. Biggest glow-up of the season.</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="team-card">
      <div class="card-header">
        <div class="tag-group">
          <div class="rank-tag">#6</div>
          <div class="trend-badge new">★ New</div>
        </div>
        <div class="scoville-mini">
          <div class="s-pip active"></div><div class="s-pip active"></div><div class="s-pip active"></div><div class="s-pip"></div><div class="s-pip"></div>
        </div>
      </div>
      <div class="team-name solo">Ian Schuller</div>
      <div class="team-stat">One event. One championship. Instant impact.</div>
    </div>
  </div>
  <div class="quiz-prompt">More dangerous?</div>
  <div class="quiz-hint">Add quiz sticker here</div>
</div>

</body>
</html>
