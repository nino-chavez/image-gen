<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<script>document.documentElement.style.zoom=Math.min(window.innerWidth/1080,window.innerHeight/1920);document.documentElement.style.background="#0a0a0a";</script>
<title>Day 3 — Rankings Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pepper-black: #0a0a0a;
    --heat-bell: #4ade80;
    --heat-poblano: #facc15;
    --heat-jalapeno: #f97316;
    --heat-habanero: #ef4444;
    --heat-reaper: #dc2626;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
  }
  body {
    width: 1080px;
    height: 1920px;
    background: var(--pepper-black);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 80px;
    position: relative;
  }
  .story > * { position: relative; z-index: 1; }
  .story::before {
    content: '';
    position: absolute;
    inset: 24px;
    border-radius: 32px;
    border: 3px solid transparent;
    background: linear-gradient(var(--pepper-black), var(--pepper-black)) padding-box,
                linear-gradient(180deg, var(--heat-bell), var(--heat-poblano), var(--heat-jalapeno), var(--heat-habanero), var(--heat-reaper)) border-box;
    pointer-events: none;
  }
  .story::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at top left, rgba(74,222,128,0.06) 0%, transparent 40%),
      radial-gradient(ellipse at bottom right, rgba(220,38,38,0.06) 0%, transparent 40%);
    pointer-events: none;
  }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    margin-bottom: 40px;
  }
  .title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 160px;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .title .scoville { color: var(--heat-jalapeno); }
  .title .power, .title .rankings { color: var(--text-primary); }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    color: var(--text-secondary);
    margin-top: 48px;
    letter-spacing: 0.02em;
    line-height: 1.5;
    max-width: 780px;
  }
  .scoville-preview {
    display: flex;
    gap: 14px;
    margin-top: 72px;
  }
  .scoville-bar {
    width: 96px;
    height: 14px;
    border-radius: 7px;
  }
  .scoville-bar:nth-child(1) { background: var(--heat-bell); }
  .scoville-bar:nth-child(2) { background: var(--heat-poblano); }
  .scoville-bar:nth-child(3) { background: var(--heat-jalapeno); }
  .scoville-bar:nth-child(4) { background: var(--heat-habanero); }
  .scoville-bar:nth-child(5) { background: var(--heat-reaper); }
  .divider {
    width: 100px;
    height: 4px;
    background: linear-gradient(90deg, var(--heat-bell), var(--heat-reaper));
    border-radius: 2px;
    margin-top: 64px;
  }
  .url {
    font-family: 'Space Mono', monospace;
    font-size: 30px;
    color: var(--heat-jalapeno);
    margin-top: 64px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="story">
  <div class="label">Official</div>
  <div class="title">
    <span class="scoville">Scoville</span><br>
    <span class="power">Power</span><br>
    <span class="rankings">Rankings</span>
  </div>
  <div class="subtitle">The official Let's Pepper power rankings. Rated on the Scoville scale.</div>
  <div class="scoville-preview">
    <div class="scoville-bar"></div>
    <div class="scoville-bar"></div>
    <div class="scoville-bar"></div>
    <div class="scoville-bar"></div>
    <div class="scoville-bar"></div>
  </div>
  <div class="divider"></div>
  <div class="url">letspepper.com/rankings</div>
</div>

</body>
</html>
