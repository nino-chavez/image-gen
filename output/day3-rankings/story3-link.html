<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<script>document.documentElement.style.zoom=Math.min(window.innerWidth/1080,window.innerHeight/1920);document.documentElement.style.background="#0a0a0a";</script>
<title>Day 3 Story — Link to Rankings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pepper-black: #0a0a0a;
    --pepper-charcoal: #1a1a1a;
    --heat-bell: #4ade80;
    --heat-poblano: #facc15;
    --heat-jalapeno: #f97316;
    --heat-habanero: #ef4444;
    --heat-reaper: #dc2626;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
  }
  body {
    width: 1080px;
    height: 1920px;
    background: var(--pepper-black);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 80px;
    position: relative;
  }
  .story > * { position: relative; z-index: 1; }
  .story::before {
    content: '';
    position: absolute;
    inset: 24px;
    border-radius: 32px;
    border: 3px solid transparent;
    background: linear-gradient(var(--pepper-black), var(--pepper-black)) padding-box,
                linear-gradient(180deg, var(--heat-bell), var(--heat-poblano), var(--heat-jalapeno), var(--heat-habanero), var(--heat-reaper)) border-box;
    pointer-events: none;
  }
  .icon {
    font-size: 100px;
    margin-bottom: 48px;
  }
  .headline {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 110px;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 40px;
  }
  .headline .see { color: var(--text-primary); }
  .headline .full { color: var(--heat-jalapeno); }
  .description {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 740px;
    margin-bottom: 64px;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 72px;
  }
  .feature-row {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    color: var(--text-secondary);
  }
  .feature-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--heat-jalapeno);
    flex-shrink: 0;
  }
  .link-sticker {
    padding: 28px 64px;
    border-radius: 20px;
    background: var(--pepper-charcoal);
    border: 2px solid var(--heat-jalapeno);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .link-url {
    font-family: 'Space Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    color: var(--heat-jalapeno);
    letter-spacing: 0.02em;
  }
  .link-label {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .sticker-hint {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--text-muted);
    margin-top: 24px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="story">
  <div class="icon">📊</div>
  <div class="headline">
    <span class="see">See the</span><br>
    <span class="full">Full Rankings</span>
  </div>
  <div class="description">8 teams ranked. Head-to-head comparisons. Who's overrated?</div>
  <div class="features">
    <div class="feature-row"><div class="feature-dot"></div><span>All 8 teams ranked #1–#8</span></div>
    <div class="feature-row"><div class="feature-dot"></div><span>Head-to-head comparison tool</span></div>
    <div class="feature-row"><div class="feature-dot"></div><span>Season stats + highlights</span></div>
  </div>
  <div class="link-sticker">
    <div class="link-url">letspepper.com/rankings</div>
    <div class="link-label">Add link sticker here</div>
  </div>
  <div class="sticker-hint">↑ Tap to view</div>
</div>

</body>
</html>
