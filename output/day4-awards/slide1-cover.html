<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<script>document.documentElement.style.zoom=Math.min(window.innerWidth/1080,window.innerHeight/1920);document.documentElement.style.background="#0a0a0a";</script>
<title>Day 4 — Awards Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pepper-black: #0a0a0a;
    --pepper-charcoal: #1a1a1a;
    --gold: #F5B91A;
    --heat-jalapeno: #f97316;
    --heat-habanero: #ef4444;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
  }
  body {
    width: 1080px;
    height: 1920px;
    background: var(--pepper-black);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 200px 60px 300px;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(245,185,26,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 70%, rgba(245,185,26,0.04) 0%, transparent 50%),
      var(--pepper-black);
  }
  .trophy {
    font-size: 120px;
    margin-bottom: 48px;
  }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 30px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 40px;
  }
  .title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 152px;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: 0.01em;
    margin-bottom: 48px;
  }
  .title .pepper { color: var(--gold); }
  .title .awards { color: var(--text-primary); }
  .subtitle {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 780px;
    margin-bottom: 64px;
  }
  .categories {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    max-width: 800px;
  }
  .cat-tag {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    padding: 12px 28px;
    border-radius: 100px;
    border: 1px solid rgba(245,185,26,0.25);
    background: rgba(245,185,26,0.06);
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .vote-badge {
    margin-top: 56px;
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-primary);
    padding: 16px 40px;
    border: 2px solid var(--gold);
    border-radius: 100px;
    background: rgba(245,185,26,0.08);
  }
</style>
</head>
<body>
<div class="story">
  <div class="trophy">🏆</div>
  <div class="label">Season Awards</div>
  <div class="title">
    <span class="pepper">Pepper</span><br>
    <span class="awards">Awards</span>
  </div>
  <div class="subtitle">5 categories. Real nominees. Your vote decides.</div>
  <div class="categories">
    <div class="cat-tag">MVP</div>
    <div class="cat-tag">Most Improved</div>
    <div class="cat-tag">Best Sportsmanship</div>
    <div class="cat-tag">Best Performance</div>
    <div class="cat-tag">Most Fun Team</div>
  </div>
  <div class="vote-badge">Voting is Open</div>
</div>

</body>
</html>
