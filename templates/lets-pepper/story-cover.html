<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>{{title}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pepper-black: #0a0a0a;
    --pepper-charcoal: #1a1a1a;
    --heat-bell: #4ade80;
    --heat-poblano: #facc15;
    --heat-jalapeno: #f97316;
    --heat-habanero: #ef4444;
    --heat-reaper: #dc2626;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --border-subtle: #27272a;
  }
  body {
    width: 1080px;
    height: 1920px;
    background: var(--pepper-black);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 72px;
    position: relative;
  }
  .story::before {
    content: '';
    position: absolute;
    inset: 24px;
    border-radius: 32px;
    border: 3px solid transparent;
    background: linear-gradient(var(--pepper-black), var(--pepper-black)) padding-box,
                linear-gradient(180deg, var(--heat-jalapeno), var(--heat-habanero), var(--heat-reaper)) border-box;
    pointer-events: none;
  }
  .story::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at top left, rgba(249,115,22,0.08) 0%, transparent 40%),
      radial-gradient(ellipse at bottom right, rgba(220,38,38,0.08) 0%, transparent 40%);
    pointer-events: none;
  }
  .story > * { position: relative; z-index: 1; }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 140px;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .title .accent { color: var(--heat-jalapeno); }
  .title .primary { color: var(--text-primary); }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    color: var(--text-secondary);
    margin-top: 32px;
    letter-spacing: 0.03em;
  }
  .divider {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, var(--heat-jalapeno), var(--heat-reaper));
    border-radius: 2px;
    margin-top: 48px;
  }
  .url {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--heat-jalapeno);
    margin-top: 48px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="story">
  <div class="label">{{label}}</div>
  <div class="title">
    <span class="accent">{{titleLine1}}</span><br>
    <span class="primary">{{titleLine2}}</span>
  </div>
  <div class="subtitle">{{subtitle}}</div>
  <div class="divider"></div>
  {{#if url}}<div class="url">{{url}}</div>{{/if}}
</div>
</body>
</html>
