<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>{{title}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    background: #0A0A0B;
    color: #FFFFFF;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 675px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 64px 72px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 80% 20%, rgba(232,108,93,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, rgba(0,206,209,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #E86C5D, #00CED1);
  }
  .card > * { position: relative; z-index: 1; }
  .category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #E86C5D;
    margin-bottom: 20px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.01em;
    max-width: 900px;
    margin-bottom: 24px;
  }
  .excerpt {
    font-size: 20px;
    color: #9CA3AF;
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 32px;
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6B7280;
  }
  .meta .dot { color: #E86C5D; }
  .brand {
    position: absolute;
    top: 64px;
    right: 72px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
  }
  .brand .signal { color: #E86C5D; font-style: italic; }
  .brand .dispatch { color: #FFFFFF; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="signal">Signal</span> <span class="dispatch">Dispatch</span>
  </div>
  {{#if category}}<div class="category">{{category}}</div>{{/if}}
  <div class="title">{{title}}</div>
  {{#if excerpt}}<div class="excerpt">{{excerpt}}</div>{{/if}}
  <div class="meta">
    {{#if author}}<span>{{author}}</span><span class="dot">/</span>{{/if}}
    {{#if date}}<span>{{date}}</span>{{/if}}
  </div>
</div>
</body>
</html>
